name: Deploy Workers

# Deploys both Cloudflare Workers in this repo:
#   • lmi-tool  (main worker + static assets, config: wrangler.jsonc)
#   • lmi-proxy (FFIEC CORS/API proxy,       config: wrangler-proxy.jsonc)
#
# Triggers:
#   • push to main (auto-deploy any merged change)
#   • workflow_dispatch (manual "Run workflow" button in GitHub UI)
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   • CLOUDFLARE_API_TOKEN  — create at dash.cloudflare.com → My Profile →
#     API Tokens → "Edit Cloudflare Workers" template. The token must
#     have Account scope: Workers Scripts Edit, Workers KV Storage Edit,
#     and Account Settings Read.
#   • CLOUDFLARE_ACCOUNT_ID — visible on the Workers & Pages page of the
#     Cloudflare dashboard (right sidebar).

on:
  push:
    branches: [main]
    # Skip deploy when only docs/meta files change.
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - ".github/workflows/monday-reminder.yml"
  workflow_dispatch:

# Cancel an in-flight deploy if another push lands on main.
concurrency:
  group: deploy-workers
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    # GitHub Actions removes Node.js 20 from runners on Sept 16, 2026.
    # actions/checkout@v4 and actions/setup-node@v4 still ship as Node 20
    # actions today, so opt them into Node 24 now to avoid the cliff.
    # Safe to remove this env block once those actions publish v5 (Node 24).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        # `npm ci` installs EXACTLY what's pinned in package-lock.json,
        # refusing any version that doesn't match. This prevents a
        # malicious wrangler minor (or any transitive dep) from being
        # auto-pulled into a prod deploy. Audit P1 #11.
        run: npm ci --no-audit --no-fund

      - name: Syntax-check workers
        # Cheap guard — catches typos before we burn a deploy slot.
        run: |
          node --check worker.js
          node --check lmi-proxy-worker.js

      - name: Deploy lmi-tool (main worker + assets)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.jsonc

      - name: Deploy lmi-proxy (FFIEC proxy)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler-proxy.jsonc

      - name: Summary
        if: always()
        run: |
          {
            echo "### Deploy result"
            echo ""
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Triggered by: ${{ github.event_name }}"
            echo "- Status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
